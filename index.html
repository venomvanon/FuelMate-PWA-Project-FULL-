<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FuelMate Modern</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#0a0f1c;
  --card:rgba(255,255,255,0.06);
  --stroke:rgba(255,255,255,0.1);
  --text:#e5e7eb;
  --muted:#9ca3af;
  --green:#22c55e;
  --blue:#3b82f6;
  --red:#ef4444;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui;
  background:radial-gradient(circle at top,#111827,#0a0f1c);
  color:var(--text);
}

.container{
  max-width:900px;
  margin:auto;
  padding:18px;
}

h2{margin:10px 0 20px;}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.card{
  background:var(--card);
  border:1px solid var(--stroke);
  backdrop-filter:blur(10px);
  padding:16px;
  border-radius:16px;
}

.big{font-size:22px;font-weight:700;}

input,select{
  width:100%;
  padding:12px;
  margin:6px 0 12px;
  border-radius:12px;
  border:1px solid var(--stroke);
  background:rgba(0,0,0,0.25);
  color:white;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
  background:linear-gradient(135deg,var(--green),#16a34a);
}

button:hover{transform:translateY(-1px);}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

td,th{
  padding:10px;
  border-bottom:1px solid var(--stroke);
  color:var(--muted);
}

th{color:white;}

.result{
  margin-top:10px;
  padding:14px;
  border-radius:14px;
  border:1px solid var(--stroke);
  background:rgba(255,255,255,0.04);
}
</style>
</head>

<body>

<div class="container">

<h2>🚗 FuelMate Modern Dashboard</h2>

<!-- INPUT -->
<div class="card">

<label>📅 วันที่</label>
<input id="date" type="date">

<label>⛽ ประเภทน้ำมัน</label>
<select id="fuelType" onchange="setFuelPrice()">
  <option value="52.5">เบนซิน</option>
  <option value="40.2">ดีเซล</option>
  <option value="35.45">E20</option>
  <option value="34.00">B20</option>
</select>

<label>💰 ราคาน้ำมัน</label>
<input id="fuelPrice" type="number">

<label>📍 ระยะทาง (กม.)</label>
<input id="distance" type="number">

<label>🌏 พื้นที่</label>
<select id="area">
  <option value="3">กรุงเทพ + ปริมณฑล</option>
  <option value="5">ต่างจังหวัด</option>
</select>

<label>🚗 ประเภทรถ</label>
<select id="car">
  <option value="25">Eco / Sedan</option>
  <option value="20">SUV / MPV</option>
  <option value="18">Pickup</option>
</select>

<label>🛣 ทางด่วน</label>
<input id="toll" type="number" value="0">

<label>🅿️ จอดรถ</label>
<input id="parking" type="number" value="0">

<button onclick="calc()">คำนวณ + บันทึก</button>

<button style="margin-top:10px;background:linear-gradient(135deg,#ef4444,#7f1d1d);"
onclick="clearByDate()">🗑 ล้างข้อมูลของวันที่เลือก</button>

<button style="margin-top:10px;background:linear-gradient(135deg,#ef4444,#450a0a);"
onclick="clearAll()">🧨 ล้างทั้งหมด</button>

<button style="margin-top:10px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);"
onclick="exportExcel()">📤 Export Excel</button>

<div class="result" id="result">กรอกข้อมูลเพื่อคำนวณ</div>

</div>

<!-- DASH -->
<div class="grid">

<div class="card">📅 วันนี้<div class="big" id="today">0</div></div>
<div class="card">📆 เดือนนี้<div class="big" id="month">0</div></div>
<div class="card">💰 รวม<div class="big" id="total">0</div></div>

</div>

<!-- CHART -->
<div class="card">
<h3>📊 Analytics</h3>
<canvas id="chart"></canvas>
</div>

<!-- TABLE -->
<div class="card">
<h3>📄 History</h3>
<table>
<thead>
<tr>
<th>วันที่</th>
<th>ยอด</th>
<th>จัดการ</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("history") || "[]");
let chart;

function setFuelPrice(){
  document.getElementById("fuelPrice").value =
  document.getElementById("fuelType").value;
}

// CALC
function calc(){

  let date = document.getElementById("date").value || new Date().toISOString().slice(0,10);
  let fuel = +document.getElementById("fuelPrice").value;
  let d = +document.getElementById("distance").value;
  let area = +document.getElementById("area").value;
  let car = +document.getElementById("car").value;
  let toll = +document.getElementById("toll").value;
  let park = +document.getElementById("parking").value;

  if(!fuel || !d){
    alert("กรอกข้อมูลให้ครบ");
    return;
  }

  let fuelCost = (d / 12) * fuel;
  let depCost = (d / car) * area * 10;
  let other = depCost + toll + park;
  let total = fuelCost + other;

  document.getElementById("result").innerHTML =
  `⛽ น้ำมัน: ${fuelCost.toFixed(2)} ฿<br>
   🚗 ค่าอื่น: ${other.toFixed(2)} ฿<br>
   🔥 รวม: ${total.toFixed(2)} ฿`;

  data.push({date,fuel:fuelCost,other,total});

  localStorage.setItem("history", JSON.stringify(data));

  render();
}

// DELETE BY DATE
function clearByDate(){
  let date = document.getElementById("date").value;
  if(!date) return alert("เลือกวันที่ก่อน");

  if(!confirm("ลบข้อมูลวันนี้?")) return;

  data = data.filter(v => v.date !== date);
  localStorage.setItem("history", JSON.stringify(data));
  render();
}

// DELETE ITEM
function deleteItem(i){
  if(!confirm("ลบรายการนี้?")) return;

  data.splice(i,1);
  localStorage.setItem("history", JSON.stringify(data));
  render();
}

// CLEAR ALL
function clearAll(){
  if(!confirm("ล้างทั้งหมด?")) return;

  data = [];
  localStorage.removeItem("history");
  render();
}

// EXPORT CSV
function exportExcel(){

  if(data.length===0) return alert("ไม่มีข้อมูล");

  let csv = "วันที่,ค่าน้ำมัน,ค่าอื่น,รวม\n";

  data.forEach(v=>{
    csv += `${v.date},${v.fuel},${v.other},${v.total}\n`;
  });

  let blob = new Blob([csv],{type:"text/csv"});
  let url = URL.createObjectURL(blob);

  let a=document.createElement("a");
  a.href=url;
  a.download="fuelmate.csv";
  a.click();

  URL.revokeObjectURL(url);
}

// RENDER
function render(){

  let today = new Date().toISOString().slice(0,10);
  let month = today.slice(0,7);

  let t=0,m=0,all=0;

  data.forEach(v=>{
    all+=v.total;
    if(v.date===today) t+=v.total;
    if(v.date.slice(0,7)===month) m+=v.total;
  });

  document.getElementById("today").innerText=t.toFixed(2);
  document.getElementById("month").innerText=m.toFixed(2);
  document.getElementById("total").innerText=all.toFixed(2);

  document.getElementById("table").innerHTML =
    data.map((v,i)=>
    `<tr>
      <td>${v.date}</td>
      <td>${v.total.toFixed(2)}</td>
      <td><button onclick="deleteItem(${i})"
      style="background:#ef4444;color:white;border:none;padding:6px 10px;border-radius:8px;">
      ลบ</button></td>
    </tr>`).join("");

  draw();
}

// CHART
function draw(){

  let labels = data.map(v=>v.date);
  let fuel = data.map(v=>v.fuel);
  let other = data.map(v=>v.other);

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
    type:'bar',
    data:{
      labels,
      datasets:[
        {label:"น้ำมัน",data:fuel,backgroundColor:"#f97316"},
        {label:"ค่าอื่น",data:other,backgroundColor:"#22c55e"}
      ]
    }
  });
}

setFuelPrice();
render();

</script>

</body>
</html>
